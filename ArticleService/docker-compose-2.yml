




services:


# --- ARTICLE SERVICE INSTANCES (X-axis) ---
  article-service-1:
    build: .
    ports:
      - "5002:8080"
    depends_on:
      - article-db-global
  article-service-2:
    build: .
    ports:
      - "5002:8080"
    depends_on:
      - article-db-global
  article-service-3:
    build: .
    ports:
      - "5002:8080"
    depends_on:
      - article-db-global
        
        
        
        
        
  # --- DATABASES (Z-axis) ---
  article-db-global:
    image: mcr.microsoft.com/mssql/server:latest
    environment:
      MSSQL_SA_PASSWORD: "SuperSecret7!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql-global:/var/opt/mssql

  article-db-continent-1:
    image: mcr.microsoft.com/mssql/server:latest
  article-db-continent-2:
    image: mcr.microsoft.com/mssql/server:latest
  article-db-continent-3:
