name: workflow.yml
on:
  push:
    branches:
      - main  # Trigger the workflow on pushes to the main branch

jobs:
  integration:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.semver.outputs.version }} 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate results of code analysis

      - name: Application Version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          bump_each_commit: true # Automatically bump version for each commit

      - name: Build
        run: dotnet build
  
  delivery:
    runs-on: ubuntu-latest
    needs: integration
    permissions:
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate results of code analysis
      
      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the Docker image
      - name: Build and Push Docker image (Article-Service)
        run: |
          docker build \
            -t ghcr.io/nelson-sv/article-service:${{ needs.integration.outputs.semver }} \
            -f ArticleService/Dockerfile \
            .
          docker push ghcr.io/nelson-sv/article-service --all-tags

      # Build the Docker image
      - name: Build and Push Docker image (Comment-Service)
        run: |
          docker build \
            -t ghcr.io/nelson-sv/comment-service:${{ needs.integration.outputs.semver }} \
            -f CommentService/Dockerfile \
            .
          docker push ghcr.io/nelson-sv/comment-service --all-tags
          
      # Build the Docker image
      - name: Build and Push Docker image (Draft-Service)
        run: |
          docker build \
            -t ghcr.io/nelson-sv/draft-service:${{ needs.integration.outputs.semver }} \
            -f DraftService/Dockerfile \
            .
          docker push ghcr.io/nelson-sv/draft-service --all-tags
          
      # Build the Docker image
      - name: Build and Push Docker image (Newsletter-Service)
        run: |
          docker build \
            -t ghcr.io/nelson-sv/newsletter-service:${{ needs.integration.outputs.semver }} \
            -f NewsletterService/Dockerfile \
            .
          docker push ghcr.io/nelson-sv/newsletter-service --all-tags
          
      # Build the Docker image
      - name: Build and Push Docker image (Profanity-Service)
        run: |
          docker build \
            -t ghcr.io/nelson-sv/profanity-service:${{ needs.integration.outputs.semver }} \
            -f ProfanityService/Dockerfile \
            .
          docker push ghcr.io/nelson-sv/profanity-service --all-tags
          
      # Build the Docker image
      - name: Build and Push Docker image (Publisher-Service)
        run: |
          docker build \
            -t ghcr.io/nelson-sv/publisher-service:${{ needs.integration.outputs.semver }} \
            -f PublisherService/Dockerfile \
            .
          docker push ghcr.io/nelson-sv/publisher-service --all-tags